[browser]
gatherUsageStats = false

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "error"

[theme]
primaryColor = "#4070F4"
backgroundColor = "#F4F7F6"
secondaryBackgroundColor = "#E8F0F5"
textColor = "#11101D"
font = "sans serif"
# Keep only supported theme keys here. Invalid theme keys were removed to avoid
# Streamlit server warnings about unknown config options.
